                              {
                                "provider_account_id": "pa_01JOWNED",
                                "operation": "chat",
                                "operation_status": "verified",
                                "model_slug": "gpt-4o-mini",
                                "offerable": true,
                                "freshness": "fresh",
                                "verified_at": "2026-07-18T00:00:00Z"
                              },
                              {
                                "provider_account_id": "pa_01JOWNED",
                                "operation": "chat_streaming",
                                "operation_status": "verified",
                                "model_slug": "gpt-4o-mini",
                                "offerable": true,
                                "streaming_class": "real",
                                "freshness": "fresh",
                                "verified_at": "2026-07-18T00:00:00Z"
                              }
                            ]
                          }
                        }
                      ]
                    }
                  }
                }
              }
            }
          },
          "401": {
            "description": "Authentication failed",
