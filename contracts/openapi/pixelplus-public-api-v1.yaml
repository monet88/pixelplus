  "components": {
    "securitySchemes": {
      "ClientApiKey": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "sk-pxp_<public_locator>_<secret>",
        "description": "Client API Key establishes the server-side Security Principal and Tenant. Clients MUST NOT submit tenant_id. Authentication material is never returned or logged."
      }
    },
    "parameters": {
      "ProviderAccountId": {
        "name": "provider_account_id",
        "in": "path",
        "required": true,
        "schema": {
          "type": "string",
          "pattern": "^pa_[A-Za-z0-9_]+$"
        },
        "description": "Same-Tenant Provider Account id. Foreign and unknown ids are indistinguishable resource_not_found outcomes."
      },
      "OAuthAuthorizationId": {
        "name": "authorization_id",
        "in": "path",
        "required": true,
        "schema": {
          "type": "string",
          "pattern": "^oauth_[A-Za-z0-9_]+$"
        },
        "description": "Server-owned OAuth authorization identifier; never a Provider token or device code."
      },
      "IdempotencyKey": {
        "name": "Idempotency-Key",
        "in": "header",
        "required": false,
        "schema": {
          "type": "string",
          "minLength": 1,
          "maxLength": 255
        },
        "description": "Optional scoped replay identity for chat compatibility. Scope is authenticated Tenant + Client API Key + key. Reuse with a different operation or fingerprint returns idempotency_conflict."
      },
      "RequiredIdempotencyKey": {
        "name": "Idempotency-Key",
        "in": "header",
        "required": true,
        "schema": {
          "type": "string",
          "minLength": 1,
          "maxLength": 255
        },
        "description": "Required scoped replay identity. Matching terminal replay returns the original safe result/resource without a new side effect; fingerprint mismatch returns idempotency_conflict."
      }
    },
    "headers": {
      "Deprecation": {
        "description": "RFC 9745 Structured Field Date announcing deprecation. Deprecation itself does not change behavior.",
        "schema": {
          "type": "string"
        },
        "example": "@1782864000"
      },
      "Sunset": {
        "description": "RFC 8594 HTTP-date announcing expected unavailability. It MUST NOT be earlier than Deprecation.",
        "schema": {
          "type": "string"
        },
        "example": "Wed, 30 Jun 2027 00:00:00 GMT"
      },
      "Link": {
        "description": "Migration documentation link using rel=deprecation when a behavior is deprecated.",
        "schema": {
          "type": "string"
        },
        "example": "<https://docs.pixelplus.example/migrations/v1>; rel=\"deprecation\"; type=\"text/html\""
      }
    },
