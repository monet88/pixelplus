  "x-pixelplus-artifact-status": "stable",
  "x-pixelplus-api-lifecycle": {
    "public_api_major": "v1",
    "semantic_version": "1.0.0",
    "versioning": {
      "policy": "semantic_versioning_2.0.0",
      "major_in_url": true,
      "backward_compatible_within_major": true,
      "breaking_change_requires_new_major": true,
      "compatible_changes": [
        "add_new_endpoint",
        "add_optional_request_field",
        "add_optional_request_header",
        "add_response_field_only_at_declared_extension_point",
        "clarify_description_without_behavior_change",
        "add_error_example_without_changing_canonical_semantics"
      ],
      "incompatible_changes": [
        "remove_or_rename_endpoint",
        "remove_or_rename_request_or_response_field",
        "make_optional_input_required",
        "change_authentication_or_scope_requirement",
        "change_http_or_canonical_error_semantics",
        "add_value_to_closed_enum",
        "remove_declared_behavior",
        "make_optional_idempotency_key_required",
        "make_required_idempotency_key_optional"
      ],
      "declared_response_extension_points": [
        "CanonicalError.code",
        "CanonicalError.operation",
        "CanonicalError.retry_after_class",
        "CanonicalError.safe_context"
      ]
    },
    "deprecation": {
      "minimum_notice_days": 180,
      "successor_general_availability_required": true,
      "removal_requires_new_major": true,
      "deprecation_does_not_change_behavior": true,
      "notice_headers": {
        "deprecation": "RFC 9745 Structured Field Date",
        "sunset": "RFC 8594 HTTP-date",
        "migration_link_relation": "deprecation"
      },
      "sunset_not_before_deprecation": true,
      "emergency_security_or_compliance_action": "behavior_may_be_blocked_by_existing_policy_and_canonical_errors_but_v1_wire_contract_is_not_silently_removed"
    }
  },
  "x-pixelplus-idempotency-policy": {
    "header": "Idempotency-Key",
    "standardization_status": "pixelplus_contract_informed_by_expired_ietf_draft",
    "scope": [
      "authenticated_tenant",
      "client_api_key",
      "key"
    ],
    "request_fingerprint": [
      "operation_identity",
      "normalized_path_and_query_inputs",
      "all_request_inputs_that_can_change_the_side_effect"
    ],
    "cross_operation_key_reuse": "idempotency_conflict",
    "retention_hours": 24,
    "expired_record_reuse": "new_request",
    "matching_replay": "return_original_operation_without_new_side_effect",
    "in_progress_replay": "do_not_call_adapter_or_create_another_side_effect",
    "fingerprint_mismatch": "idempotency_conflict_without_changing_original_operation",
    "uncertain_owner": "no_claim_stealing_or_reexecution",
    "secret_fingerprint_storage": "non_reversible_keyed_digest",
    "raw_secret_storage": "forbidden",
    "retry_owners": {
      "chat": "chat_execution_layer",
      "render_job": "render_job_execution_layer",
      "forbidden_full_execution_retry_owners": [
        "http_middleware",
        "adapter",
        "routing",
        "queue",
        "worker_redelivery"
      ],
      "committed_or_unknown": "replacement_execution_forbidden"
    },
    "operation_classes": {
      "chat_execution": {
        "operations": [
          "createChatCompletion"
        ],
        "header": "optional",
        "reason": "bounded_openai_compatibility"
      },
      "durable_creation": {
        "operations": [
          "createAsset",
          "createImageGeneration",
          "createImageEdit",
          "createImageInpaint",
          "createProviderAccount",
          "submitProviderCredential",
          "startOAuthAuthorization",
          "reauthenticateProviderAccount"
        ],
        "header": "required"
      },
      "resource_state_commands": {
        "operations": [
          "cancelChatExecution",
          "cancelRenderJob",
          "deleteProviderAccount",
          "probeProviderAccount",
          "disableProviderAccount",
          "enableProviderAccount",
          "replaceRoutingPolicy"
        ],
        "header": "not_required",
        "replay": "same_resource_state_transition_must_not_duplicate_external_work"
      },
      "resource_retrieval": {
        "operations": [
          "listModels",
          "listProviderAccounts",
          "getProviderAccount",
          "getOAuthAuthorization",
          "getCapabilitySnapshot",
          "getRoutingPolicy"
        ],
        "header": "not_applicable",
        "replay": "read_existing_resource_without_provider_or_job_execution"
      },
      "output_retrieval": {
        "operations": [
          "getAsset",
          "getAssetContent",
          "getRenderJob"
        ],
        "header": "not_applicable",
        "replay": "read_existing_resource_without_rendering_or_provider_execution"
      },
      "output_delivery_retry": {
        "operations": [
          "retryRenderJobOutput"
        ],
        "header": "not_required",
        "replay": "reuse_existing_manifest_and_placement_identity",
        "forbidden": [
          "new_render_job",
          "new_provider_execution"
        ]
      }
    }
  },
  "x-pixelplus-contract-testing": {
    "entrypoint": "public_http_surface",
    "composition": "real_gateway_composition",
    "controlled_implementations_at_ports": [
      "adapter",
      "credential_vault",
      "persistence",
      "job_runtime",
      "clock",
      "id_generator"
    ],
    "forbidden_test_seams": [
      "handler_stub",
      "private_function",
      "concrete_database_schema",
      "goroutine_layout"
    ],
    "required_observations": [
      "http_status_headers_and_body",
      "durable_resource_identity",
      "adapter_call_count",
      "vault_read_write_decrypt_and_revoke_counts",
      "persistence_and_job_side_effect_counts",
      "same_tenant_and_non_enumeration_behavior",
      "idempotency_replay_conflict_and_uncertain_outcomes"
    ],
    "ownership_rejection_before": [
      "vault_decrypt",
      "adapter_call",
      "job_enqueue"
    ],
    "concrete_interface_and_package_layout": "deferred_to_issue_21",
    "runtime_suite_status": "required_when_gateway_composition_exists"
  }
