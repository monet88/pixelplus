    "/models": {
      "get": {
        "operationId": "listModels",
        "summary": "List models and owner-Tenant capability offers",
        "description": "Public route: GET /v1/models. Returns OpenAI core model fields plus x_pixelplus.offers with owner-Tenant provider_account_id, operation status, model_slug, offerable, streaming_class where relevant, and snapshot freshness/verified_at. Never provider credential/raw evidence/static provider catalog.",
        "security": [
          {
            "ClientApiKey": []
          }
        ],
        "tags": [
          "Models"
        ],
        "responses": {
          "200": {
            "description": "Model list with capability offers",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ModelListResponse"
                },
                "examples": {
                  "ModelListExample": {
                    "summary": "Offer list",
                    "value": {
                      "object": "list",
                      "data": [
                        {
                          "id": "gpt-4o-mini",
                          "object": "model",
