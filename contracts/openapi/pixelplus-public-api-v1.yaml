    "/chat/executions/{execution_id}/cancel": {
      "post": {
        "operationId": "cancelChatExecution",
        "summary": "Cancel an in-flight chat execution",
        "description": "Public route: POST /v1/chat/executions/{execution_id}/cancel. Acknowledges cancel_requested/canceled honestly and includes upstream_abort_attempted/upstream_stop_confirmed booleans; never claims stop unless confirmed. Cancellation is not proof upstream stopped. Disconnect is also implicit cancel.",
        "security": [
          {
            "ClientApiKey": []
          }
        ],
        "tags": [
          "Chat"
        ],
        "parameters": [
          {
            "name": "execution_id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Cancel acknowledgement",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ChatCancelResponse"
                },
                "examples": {
                  "CancelRequested": {
                    "summary": "Honest cancel_requested",
                    "value": {
                      "execution_id": "exec_01JSTREAM",
                      "cancel_state": "cancel_requested",
                      "upstream_abort_attempted": true,
                      "upstream_stop_confirmed": false,
                      "request_id": "req_01JCANCEL2"
