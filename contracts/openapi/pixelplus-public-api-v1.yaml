    "version": "1.0.0",
    "summary": "Stable unified inference and management contract",
    "description": "Stable PixelPlus Public API contract. The /v1 server base applies to every relative path in this document. Client API Key authentication derives Tenant authority server-side; clients never submit tenant_id. Chat and image execution, Provider Account management, Capability Snapshot reads, Routing Policy, durable Render Jobs, Assets, canonical errors, idempotency, deprecation, and compatibility share one versioned package.",
    "license": {
      "name": "Proprietary"
    },
    "x-pixelplus-issue": 20,
    "x-pixelplus-parent-issue": 1,
    "x-pixelplus-base-commit": "f8213c45680d12ab38454a15bfc8475c9a2ef9d9"
  },
  "jsonSchemaDialect": "https://json-schema.org/draft/2020-12/schema",
  "servers": [
    {
      "url": "/v1",
      "description": "Stable Public API major-version base"
    }
  ],
