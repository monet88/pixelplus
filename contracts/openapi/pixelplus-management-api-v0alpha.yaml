    "/provider-accounts/{provider_account_id}/credentials": {
      "parameters": [
        {
          "$ref": "#/components/parameters/ProviderAccountId"
        }
      ],
      "post": {
        "operationId": "submitProviderCredential",
        "summary": "Submit direct Provider Credential",
        "description": "Approved direct secret boundary for a pure draft account. The request may carry Provider Credential material once; the response never echoes it. Request-shape and credential-class failures occur before vault write. Accepted material is stored and lands in observable pending_validation; a separate server-owned validation step either advances to pending_probe or revokes the staged version and records safe submit_credential remediation. No Adapter call or provider_probe occurs until validation succeeds, storing material alone never sets active, and later lifecycle states cannot use this endpoint to bypass reauthentication or enable.",
        "security": [
          {
            "ClientApiKey": []
          }
        ],
        "responses": {
          "202": {
            "description": "Credential accepted and stored; account remains non-usable in pending_validation until the separate server-owned validation step completes",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AccountOperationResponse"
                },
                "example": {
                  "account": {
                    "provider_account_id": "pa_demo_02",
                    "provider": "gemini",
                    "auth_mode": "gemini_web_cookie",
                    "label": "Gemini web",
                    "lifecycle_state": "pending_validation",
                    "credential": {
                      "version": 1,
                      "refresh_supported": false
                    },
                    "health": {
                      "summary_state": "unknown",
                      "conditions": [
                        {
                          "scope": {
                            "kind": "account"
                          },
                          "state": "unknown",
                          "reason": "initial_unprobed",
                          "credential_version": 1,
                          "observed_at": "2026-07-18T10:06:00Z",
                          "remediation": "none"
                        }
                      ]
                    },
                    "administrative_controls": {
                      "drain_state": "off",
                      "quarantine_state": "off",
                      "auth_mode_execution_enabled": true
                    },
                    "created_at": "2026-07-18T10:05:00Z",
