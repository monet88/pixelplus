          "correlation_id": {
            "type": "string"
          },
          "operation": {
            "type": "string"
          },
          "failure_stage": {
            "type": "string",
            "enum": [
              "authentication",
              "authorization",
              "request_validation",
              "routing",
              "capability",
              "credential",
              "recovery",
              "dependency",
              "internal"
            ]
          },
          "retry_after_class": {
            "type": "string"
          },
          "retry_after_seconds": {
            "type": "integer",
            "minimum": 1,
