            "type": "string",
            "enum": [
              "unauthorized",
              "not_found",
              "forbidden",
              "invalid_request",
              "account_policy",
              "capability",
              "routing",
              "conflict",
              "dependency",
              "internal"
            ]
          },
          "retryability": {
            "type": "string",
            "enum": [
              "not_retryable",
              "retry_after",
              "safe_internal_retry",
              "new_request_only",
              "operator_action_required"
            ]
          },
          "remediation": {
            "$ref": "#/components/schemas/Remediation"
          },
          "request_id": {
            "type": "string",
