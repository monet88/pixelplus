    "/provider-accounts/{provider_account_id}/oauth-authorizations": {
      "parameters": [
        {
          "$ref": "#/components/parameters/ProviderAccountId"
        }
      ],
      "post": {
        "operationId": "startOAuthAuthorization",
        "summary": "Start OAuth browser/device authorization",
        "description": "Starts a server-owned OAuth journey for connect or reauthenticate. Connect requires a pure draft account; reauthentication stages a replacement without making a disabled account usable. A reauthentication start is rejected while any authorization, validation, replacement, or one-shot probe marker is in flight. Disable intent remains sticky across authorization, exchange, and probe for either purpose; only explicit enable plus a current-version probe may restore active use. It returns only user-facing verification metadata; access tokens, refresh tokens, authorization codes, device_code, and PKCE verifier remain server-side.",
        "security": [
          {
            "ClientApiKey": []
          }
        ],
        "responses": {
          "202": {
            "description": "Successful response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/OAuthAuthorization"
                },
                "example": {
                  "authorization_id": "oauth_demo_01",
                  "provider_account_id": "pa_demo_03",
                  "purpose": "connect",
                  "flow": "device",
                  "status": "authorization_pending",
                  "verification_uri": "https://provider.example/device",
                  "user_code": "ABCD-EFGH",
                  "expires_at": "2026-07-18T10:25:00Z",
                  "remediation": "complete_oauth"
                }
              }
            }
