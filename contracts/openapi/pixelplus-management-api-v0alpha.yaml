                {
                  "type": "boolean"
                },
                {
                  "type": "integer"
                },
                {
                  "type": "number"
                },
                {
                  "type": "null"
                }
              ]
            },
            "description": "Bounded safe metadata only. Never tenant_id, Provider Credential, raw Provider payload, challenge material, or foreign resource details."
          }
        },
        "description": "Canonical Provider-independent management error. Foreign and unknown identifiers use identical resource_not_found bodies without resource_reference."
      }
