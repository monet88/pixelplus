{
  "openapi": "3.1.1",
  "info": {
    "title": "PixelPlus OpenAI-Compatible Inference Contract (Prototype)",
    "version": "0.0.0-prototype",
    "summary": "Non-final tracer bullet for issue #18",
    "description": "NON-FINAL prototype OpenAPI 3.1.1 artifact for issue #18. jsonSchemaDialect is JSON Schema 2020-12. This is not the final versioned Public API; issue #20 consolidates it with the management contract. Server base is /v1; path keys are relative (no duplicated /v1). Full public routes are documented as /v1/... in operation descriptions. Official OpenAI-compatible baseline surfaces: /v1/models, /v1/chat/completions, /v1/images/generations, /v1/images/edits. PixelPlus adds explicit /v1/images/inpaints, durable render-job, asset, capability metadata, output-delivery retry, and chat cancel surfaces. SSE sequence: open -> delta* (heartbeats allowed) -> exactly one completed|failed|canceled terminal; no post-terminal data; no [DONE] second sentinel; disconnect is implicit cancel; cancellation is not proof upstream stopped; commit-unknown implies no fallback/retry. Image operations are async durable jobs returning 202; completed may contain pending output entries; output placement retry never re-renders.",
    "license": {
      "name": "Proprietary"
    },
    "x-pixelplus-issue": 18,
    "x-pixelplus-parent-issue": 1,
    "x-pixelplus-base-commit": "d1c2830"
  },
  "jsonSchemaDialect": "https://json-schema.org/draft/2020-12/schema",
  "servers": [
    {
      "url": "/v1",
      "description": "Public inference API base. Full routes are /v1/..."
    }
  ],
  "tags": [
    {
      "name": "Models"
    },
    {
      "name": "Chat"
    },
    {
      "name": "Assets"
    },
    {
      "name": "Images"
    },
    {
      "name": "RenderJobs"
    }
  ],
  "security": [
    {
      "ClientApiKey": []
    }
  ],
