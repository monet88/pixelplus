    "/chat/completions": {
      "post": {
        "operationId": "createChatCompletion",
        "summary": "Create chat completion (stream or non-stream)",
        "description": "Public route: POST /v1/chat/completions. OpenAI-like model/messages/stream. Optional x_pixelplus routing fields (provider_account_id, allow_fallback). Idempotency-Key header for scoped replay. Does not accept tenant_id. SSE sequence open -> delta* (heartbeats allowed) -> exactly one completed|failed|canceled terminal; no post-terminal data; no [DONE] second sentinel; disconnect is implicit cancel; cancellation is not proof upstream stopped; commit-unknown implies no fallback/retry.",
        "security": [
          {
            "ClientApiKey": []
          }
        ],
        "tags": [
          "Chat"
        ],
        "parameters": [
          {
            "name": "Idempotency-Key",
            "in": "header",
            "required": false,
            "schema": {
              "type": "string",
              "minLength": 1
            },
            "description": "Scoped idempotency key for non-idempotent chat execution."
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ChatCompletionRequest"
              },
              "examples": {
                "NonStream": {
                  "summary": "Non-stream chat",
                  "value": {
                    "model": "gpt-4o-mini",
                    "messages": [
                      {
                        "role": "user",
                        "content": "Hello"
                      }
                    ],
                    "stream": false,
                    "x_pixelplus": {
                      "allow_fallback": true
                    }
                  }
                },
                "Stream": {
                  "summary": "Stream chat",
                  "value": {
                    "model": "gpt-4o-mini",
                    "messages": [
                      {
                        "role": "user",
                        "content": "Hello"
                      }
                    ],
                    "stream": true
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Non-stream success or SSE stream",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ChatCompletionResponse"
                },
                "examples": {
                  "NonStreamSuccess": {
                    "summary": "Non-stream completed",
                    "value": {
                      "id": "chatcmpl_01JEXAMPLE",
                      "object": "chat.completion",
                      "created": 1720000000,
                      "model": "gpt-4o-mini",
                      "choices": [
                        {
                          "index": 0,
                          "message": {
                            "role": "assistant",
                            "content": "Hi!"
                          },
                          "finish_reason": "stop"
                        }
                      ],
                      "usage": {
                        "prompt_tokens": 8,
                        "completion_tokens": 2,
                        "total_tokens": 10
                      },
                      "x_pixelplus": {
                        "request_id": "req_01JEXAMPLE",
                        "execution_id": "exec_01JCHAT",
                        "provider_account_id": "pa_01JOWNED",
                        "finish_class": "stop"
                      }
                    }
                  }
                }
              },
              "text/event-stream": {
                "schema": {
                  "$ref": "#/components/schemas/ChatStreamEvent"
                },
                "examples": {
                  "OpenEvent": {
                    "summary": "open",
                    "value": {
                      "type": "open",
                      "id": "chatcmpl_01JSTREAM",
                      "model": "gpt-4o-mini",
                      "created": 1720000001,
                      "x_pixelplus": {
                        "request_id": "req_01JSTREAM",
                        "execution_id": "exec_01JSTREAM"
                      }
                    }
                  },
                  "DeltaEvent": {
                    "summary": "delta",
                    "value": {
                      "type": "delta",
                      "id": "chatcmpl_01JSTREAM",
                      "choices": [
                        {
                          "index": 0,
                          "delta": {
                            "content": "Hello"
                          }
                        }
                      ]
                    }
                  },
                  "HeartbeatEvent": {
                    "summary": "heartbeat",
                    "value": {
                      "type": "heartbeat",
                      "ts": 1720000002
                    }
                  },
                  "CompletedEvent": {
                    "summary": "completed terminal",
                    "value": {
                      "type": "completed",
                      "id": "chatcmpl_01JSTREAM",
                      "finish_class": "stop",
                      "usage": {
                        "prompt_tokens": 8,
                        "completion_tokens": 4,
                        "total_tokens": 12
                      },
                      "x_pixelplus": {
                        "request_id": "req_01JSTREAM",
                        "execution_id": "exec_01JSTREAM",
                        "finish_class": "stop"
                      }
                    }
                  },
                  "FailedEvent": {
                    "summary": "failed terminal",
                    "value": {
                      "type": "failed",
                      "id": "chatcmpl_01JFAIL",
                      "finish_class": "failed",
                      "error": {
                        "code": "provider_rate_limited",
                        "category": "execution",
                        "status_class": "provider_rate",
                        "retryability": "new_request_only",
                        "remediation": "wait_provider_cooldown",
                        "request_id": "req_01JEXAMPLE",
                        "failure_stage": "upstream_execution",
                        "operation": "chat_streaming",
                        "commit_status": "unknown",
                        "correlation_id": "cor_01JRATE",
                        "safe_context": {
                          "commit_certainty": "unknown"
                        }
                      },
                      "x_pixelplus": {
                        "request_id": "req_01JRATE",
                        "execution_id": "exec_01JFAIL",
                        "finish_class": "failed"
                      }
                    }
                  },
                  "CanceledEvent": {
                    "summary": "canceled terminal",
                    "value": {
                      "type": "canceled",
                      "id": "chatcmpl_01JCANCEL",
                      "finish_class": "canceled",
                      "x_pixelplus": {
                        "request_id": "req_01JCANCEL",
                        "execution_id": "exec_01JCANCEL",
                        "finish_class": "canceled",
                        "upstream_abort_attempted": true,
                        "upstream_stop_confirmed": false
                      }
                    }
                  }
                }
              }
            }
          },
          "400": {
            "description": "Invalid request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CanonicalError"
                }
              }
            }
          },
          "401": {
            "description": "Authentication failed",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CanonicalError"
                }
              }
            }
          },
          "403": {
            "description": "Forbidden",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CanonicalError"
                }
              }
            }
          },
          "404": {
            "description": "Foreign/unknown resource",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CanonicalError"
                },
                "examples": {
                  "ErrorResourceNotFound": {
                    "$ref": "#/components/examples/ErrorResourceNotFound"
                  }
                }
              }
            }
          },
          "409": {
            "description": "Idempotency conflict / uncertain",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CanonicalError"
                },
                "examples": {
                  "ErrorExecutionPossiblyCommitted": {
                    "$ref": "#/components/examples/ErrorExecutionPossiblyCommitted"
                  }
                }
              }
            }
          },
          "422": {
            "description": "Capability / account pre-upstream rejection",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CanonicalError"
                },
                "examples": {
                  "ErrorCapabilityUnsupported": {
                    "$ref": "#/components/examples/ErrorCapabilityUnsupported"
                  },
                  "ErrorCapabilityUnverified": {
                    "$ref": "#/components/examples/ErrorCapabilityUnverified"
                  },
                  "ErrorSnapshotStale": {
                    "$ref": "#/components/examples/ErrorSnapshotStale"
                  },
                  "ErrorAccountNotUsable": {
                    "$ref": "#/components/examples/ErrorAccountNotUsable"
                  }
                }
              }
            }
          },
          "429": {
            "description": "Distinct Public API admission limits and Provider runtime rate/quota outcomes; codes and failure_stage preserve the pre-A6 versus post-A6 boundary.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CanonicalError"
                },
                "examples": {
                  "ErrorRateLimit": {
                    "$ref": "#/components/examples/ErrorRateLimit"
                  },
                  "ErrorConcurrencyLimit": {
                    "$ref": "#/components/examples/ErrorConcurrencyLimit"
                  },
                  "ErrorQuotaExhausted": {
                    "$ref": "#/components/examples/ErrorQuotaExhausted"
                  },
                  "ErrorProviderRateLimitedUnknown": {
                    "$ref": "#/components/examples/ErrorProviderRateLimitedUnknown"
                  },
                  "ErrorProviderQuotaExhausted": {
                    "$ref": "#/components/examples/ErrorProviderQuotaExhausted"
                  }
                }
              }
            }
          },
          "502": {
            "description": "Upstream/runtime failure",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/CanonicalError"
                },
                "examples": {
                  "ErrorProviderAuthExpired": {
                    "$ref": "#/components/examples/ErrorProviderAuthExpired"
                  },
                  "ErrorProviderChallenged": {
                    "$ref": "#/components/examples/ErrorProviderChallenged"
                  },
                  "ErrorUpstreamProtocolDrift": {
                    "$ref": "#/components/examples/ErrorUpstreamProtocolDrift"
                  },
