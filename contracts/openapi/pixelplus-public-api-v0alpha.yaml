                              },
                              {
                                "provider_account_id": "pa_01JOWNED",
                                "operation": "chat_streaming",
                                "operation_status": "verified",
                                "model_slug": "gpt-4o-mini",
                                "offerable": true,
                                "streaming_class": "real",
